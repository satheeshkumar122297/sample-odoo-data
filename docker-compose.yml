version: '3.8'

services:
  db:
    image: postgres:15
    container_name: odoo18-db
    restart: always
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  odoo:
    build: .
    container_name: odoo18
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - /opt/odoo18/config:/etc/odoo
    restart: always

volumes:
  db_data:
